<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>France Airports Map</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        body, html { margin: 0; padding: 0; height: 100%; background-color: #000; }
        #map { height: 100vh; width: 100vw; background-color: #000; }

        .glow-dot, .glow-dot-selected {
            background: transparent !important;
            border: none !important;
            display: flex !important;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .glow-dot::after {
            content: '';
            display: block;
            width: 4px;
            height: 4px;
            background-color: #ffffff; 
            border-radius: 50%;
            box-shadow: 0 0 10px 4px rgba(255, 140, 0, 0.8); 
            transition: box-shadow 0.2s ease-in-out; 
        }

        .glow-dot-selected::after {
            content: '';
            display: block;
            width: 5px;
            height: 5px;
            background-color: #ffffff; 
            border-radius: 50%;
            box-shadow: 0 0 14px 5px rgba(135, 206, 250, 0.9); 
        }

        .glow-dot-selected {
            z-index: 1000 !important;
        }
    </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    const map = L.map('map').setView([46.2276, 2.2137], 6);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://carto.com/">CartoDB</a>',
        subdomains: 'abcd',
        maxZoom: 19
    }).addTo(map);


    const defaultIcon = L.divIcon({
        className: 'glow-dot',
        iconSize: [32, 32],
        iconAnchor: [16, 16]
    });

    const selectedIcon = L.divIcon({
        className: 'glow-dot-selected',
        iconSize: [32, 32],
        iconAnchor: [16, 16]
    });

    function renderAirports(jsonFile, chosenIcon) {
        fetch(jsonFile)
            .then(response => response.json())
            .then(data => {
                data.forEach(airport => {
                    if(airport.lat && airport.lon) {
                        const marker = L.marker([airport.lat, airport.lon], { icon: chosenIcon });
                        
                        /* ----------------------------------------------------
                        // SECTION ABATTUE
                        
                        let isSelected = (chosenIcon === selectedIcon);
                        
                        marker.on('click', function() {
                            if (!isSelected) {
                                marker.setIcon(selectedIcon);
                                isSelected = true;
                            } else {
                                marker.setIcon(defaultIcon);
                                isSelected = false;
                            }
                        });
                        ---------------------------------------------------- */

                        marker.addTo(map);
                    }
                });
            })
            .catch(error => console.error(`Error loading the file (${jsonFile}):`, error));
    }


    renderAirports('FLOWN.json', selectedIcon);
    renderAirports('NOTFLOWN.json', defaultIcon);

</script>

</body>
</html>
