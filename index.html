<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Carte des Terrains</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!--Coucou, toi! Ça va? J'espère que le code n'est pas trop dégeu.-->

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        body, html { margin: 0; padding: 0; height: 100%; background-color: #000; }
        #map { height: 100vh; width: 100vw; background-color: #000; }

        .glow-dot, .glow-dot-selected {
            background: transparent !important;
            border: none !important;
            display: flex !important;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .glow-dot::after {
            content: '';
            display: block;
            width: 4px;
            height: 4px;
            background-color: #ffffff; 
            border-radius: 50%;
            box-shadow: 0 0 10px 4px rgba(255, 140, 0, 0.8); 
            transition: box-shadow 0.2s ease-in-out; 
        }

        .glow-dot-selected::after {
            content: '';
            display: block;
            width: 5px;
            height: 5px;
            background-color: #ffffff; 
            border-radius: 50%;
            box-shadow: 0 0 14px 5px rgba(135, 206, 250, 0.9); 
        }

        .glow-dot-selected {
            z-index: 1000 !important;
        }

        .custom-dark-popup .leaflet-popup-content-wrapper {
            background: rgba(15, 15, 15, 0.9) !important; 
            color: #ffffff !important;
            border: 1px solid rgba(255, 255, 255, 0.2); 
            border-radius: 6px;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            font-size: 13px;
            font-weight: 500;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.7);
        }

        .custom-dark-popup .leaflet-popup-tip {
            background: rgba(15, 15, 15, 0.9) !important;
            border-left: 1px solid rgba(255, 255, 255, 0.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .custom-dark-popup .leaflet-popup-content {
            margin: 6px 12px !important;
            line-height: 1.3;
        }
    </style>
</head>
<body>

<div id="map"></div>







<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    const map = L.map('map').setView([46.2276, 2.2137], 6);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://carto.com/">CartoDB</a>',
        subdomains: 'abcd',
        maxZoom: 19
    }).addTo(map);

    const Iconedebase = L.divIcon({
        className: 'glow-dot',
        iconSize: [32, 32],
        iconAnchor: [16, 16]
    });





    const Iconeclique = L.divIcon({
        className: 'glow-dot-selected',
        iconSize: [32, 32],
        iconAnchor: [16, 16]
    });


    function renderAirports(jsonFile, chosenIcon) {
        fetch(jsonFile)
            .then(response => response.json())
            .then(data => {
                data.forEach(airport => {

                    
                    if(airport.lat && airport.lon) {
                        const marker = L.marker([airport.lat, airport.lon], { icon: chosenIcon });

                        
                        const etiquetteTerrain = airport.icao ? `${airport.icao} - ${airport.name}` : airport.name;
                        
                        
                        marker.bindPopup(etiquetteTerrain, {
                            closeButton: false,        
                            offset: L.point(0, -10), 
                            className: 'custom-dark-popup'
                        });




                        
                        marker.addTo(map);
                    }
                });
            })
            .catch(error => console.error(`Error loading the file (${jsonFile}):`, error));
    }








    renderAirports('FLOWN.json', Iconeclique); 
    renderAirports('NOTFLOWN.json', Iconedebase); 

</script>

</body>
</html>
